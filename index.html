<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডোমেইন সংরক্ষিত</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #e94560;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #d1d8e0;
        }
        a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            transition: 0.3s;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }
        a:hover {
            color: #4facfe;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ডোমেইনটি সংরক্ষিত</h1>
        <p>খুব শীঘ্রই এখানে নতুন কিছু আসছে!</p>
        <p>যেকোনো প্রয়োজনে যোগাযোগ করুন:</p>
        <a href="https://miqdad23.pro.bd" target="_blank">miqdad23.pro.bd</a>
    </div>

</body>
</html>
